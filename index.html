<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思能力科技樹 × 成就系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0d0c;--region:#333333;--text:#c6c7bd;
  --lavender:#C3A5E5;--special:#C8DD5A;--warning:#F08080;
  --salmon:#E5C3B3;--attention:#E5E5A6;--sky:#04b5a3;
  --safe:#81E6D9;--brown:#d9b375;--info:#90CDF4;
  --pink:#FFB3D9;--orange:#f69653;
  /* Global UI font scale — updated by font slider */
  --ui-scale: 1;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Exo 2','Segoe UI',system-ui,sans-serif;min-height:100vh}

/* ── Topbar ── */
.topbar{position:sticky;top:0;z-index:200;background:#0a0b0a;border-bottom:1px solid #181918;
  padding:9px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.topbar-brand{display:flex;align-items:center;gap:8px;font-size:calc(.9rem * var(--ui-scale));font-weight:700;color:var(--text)}
.topbar-brand i{color:var(--info)}
.topbar-brand .tag{font-size:calc(.58rem * var(--ui-scale));font-family:'Share Tech Mono',monospace;color:#5a5b58;letter-spacing:.08em}
.topbar-stats{display:flex;align-items:center;gap:14px;font-family:'Share Tech Mono',monospace;font-size:calc(.7rem * var(--ui-scale))}
.stat-pill{display:flex;align-items:center;gap:5px}
.stat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.stat-val{font-size:calc(.92rem * var(--ui-scale));font-weight:700}

/* ── Layout ── */
.main-layout{display:flex;min-height:calc(100vh - 46px)}
.canvas-area{flex:1;padding:24px 20px 60px;overflow:auto;display:flex;flex-direction:column;align-items:center;gap:16px}
.tree-eyebrow{font-size:calc(.6rem * var(--ui-scale));color:#5a5b58;font-family:'Share Tech Mono',monospace;
  letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.tree-eyebrow::before{content:'';width:14px;height:1px;background:var(--info)}

/* ── Sidebar ── */
.sidebar{width:216px;flex-shrink:0;background:#0a0b0a;border-left:1px solid #181918;
  padding:16px 13px;display:flex;flex-direction:column;gap:13px;
  position:sticky;top:46px;height:calc(100vh - 46px);
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:#181918 transparent;
  font-family:'Share Tech Mono',monospace;}
.sb-sec{font-size:calc(.58rem * var(--ui-scale));color:var(--special);letter-spacing:.13em;text-transform:uppercase;
  display:flex;align-items:center;gap:5px;padding-bottom:5px;border-bottom:1px solid #181918}
.sb-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.sb-lbl{font-size:calc(.62rem * var(--ui-scale));color:#6a6b68}
.sb-val{font-size:calc(.88rem * var(--ui-scale));font-weight:700}
.divider{height:1px;background:#181918;flex-shrink:0}

/* ring */
.ring-center{text-align:center}
.ring-wrap{display:inline-block;position:relative;margin:3px 0}
.ring-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:calc(.66rem * var(--ui-scale));font-weight:700;color:var(--text);text-align:center;line-height:1.2}
.ring-sub{font-size:calc(.48rem * var(--ui-scale));color:#5a5b58;margin-top:1px}

/* log */
.log-box{max-height:150px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#181918 transparent}
.log-entry{font-size:calc(.6rem * var(--ui-scale));padding:2px 0;border-bottom:1px solid #111211;color:var(--safe);line-height:1.4}
.log-entry.err  {color:var(--warning)}
.log-entry.info {color:var(--info)}
.log-entry.warn {color:var(--attention)}
.log-entry.gold {color:var(--special)}

/* legend */
.legend{display:flex;flex-direction:column;gap:4px}
.legend-row{display:flex;align-items:center;gap:6px;font-size:calc(.59rem * var(--ui-scale));color:#7a7b78}
.legend-sw{width:11px;height:11px;border-radius:3px;border:1.5px solid;flex-shrink:0}

/* ── Control panel ── */
.ctrl-panel{background:#0e0f0e;border:1px solid #1a1b1a;border-radius:8px;padding:12px 13px;display:flex;flex-direction:column;gap:10px}
.ctrl-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ctrl-label{font-size:calc(.6rem * var(--ui-scale));color:#6a6b68;white-space:nowrap;min-width:44px}

/* Theme switcher */
.theme-btns{display:flex;gap:4px;flex-wrap:wrap}
.theme-btn{width:20px;height:20px;border-radius:4px;border:2px solid transparent;
  cursor:pointer;transition:border-color .15s,transform .15s;padding:0;flex-shrink:0}
.theme-btn:hover{transform:scale(1.2)}
.theme-btn.active{border-color:#fff}

/* Scale / Font sliders */
.slider-wrap{flex:1;display:flex;align-items:center;gap:6px}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:3px;
  background:#1e1f1e;border-radius:2px;outline:none;cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--info);cursor:pointer;border:none}
.slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--info);cursor:pointer;border:none}
.slider-val{font-size:calc(.6rem * var(--ui-scale));color:var(--info);min-width:28px;text-align:right;font-family:'Share Tech Mono',monospace}

/* buttons */
.btn-row{display:flex;gap:5px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:5px;
  border:1px solid #2a2b28;background:#0e0f0e;color:#7a7b78;font-size:calc(.63rem * var(--ui-scale));
  cursor:pointer;transition:all .15s;font-family:'Exo 2',sans-serif;white-space:nowrap}
.btn:hover{border-color:var(--info);color:var(--info)}
.btn.danger:hover{border-color:var(--warning);color:var(--warning)}
.btn.gold:hover{border-color:var(--special);color:var(--special)}

.ach-sidebar-btn{display:flex;align-items:center;justify-content:space-between;
  padding:7px 9px;border-radius:6px;background:#0e0f0e;border:1px solid #2a2b28;
  cursor:pointer;transition:all .15s;font-family:'Exo 2',sans-serif;font-size:calc(.7rem * var(--ui-scale));color:#7a7b78}
.ach-sidebar-btn:hover{border-color:var(--special);color:var(--special)}
.ach-sidebar-count{background:var(--special);color:#0c0d0c;font-size:calc(.58rem * var(--ui-scale));font-weight:800;
  min-width:17px;height:17px;padding:0 3px;border-radius:9px;
  display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <i class="bi bi-mortarboard-fill"></i>
    <span>雅思能力科技樹</span>
    <span class="tag">IELTS SKILL TREE + ACHIEVEMENT  v1.2</span>
  </div>
  <div class="topbar-stats">
    <div class="stat-pill"><span class="stat-dot" style="background:var(--info)"></span><span class="sb-lbl">學習點</span><span class="stat-val" id="hdr-sp" style="color:var(--info)">8</span></div>
    <div class="stat-pill"><span class="stat-dot" style="background:var(--attention)"></span><span class="sb-lbl">已解鎖</span><span class="stat-val" id="hdr-ul" style="color:var(--attention)">2</span></div>
    <div class="stat-pill"><span class="stat-dot" style="background:var(--special)"></span><span class="sb-lbl">成就</span><span class="stat-val" id="hdr-ach" style="color:var(--special)">0</span></div>
  </div>
</header>

<div class="main-layout">
  <div class="canvas-area">
    <div class="tree-eyebrow"><i class="bi bi-compass"></i> 詞彙 ✕ 閱讀 ✕ 句法 ✕ 思維 → 雅思高分</div>
    <div id="ielts-tree"></div>
  </div>

  <aside class="sidebar">

    <!-- Progress ring -->
    <div>
      <div class="sb-sec"><i class="bi bi-graph-up-arrow"></i> 進度</div>
      <div class="ring-center">
        <div class="ring-wrap">
          <svg width="72" height="72">
            <circle cx="36" cy="36" r="28" fill="none" stroke="#181918" stroke-width="5"/>
            <circle id="ring-fg" cx="36" cy="36" r="28" fill="none"
              stroke="var(--attention)" stroke-width="5" stroke-linecap="round"
              stroke-dasharray="175.9" stroke-dashoffset="175.9"
              transform="rotate(-90 36 36)" style="transition:stroke-dashoffset .55s ease"/>
          </svg>
          <div class="ring-num"><span id="ring-pct">0%</span><div class="ring-sub">完成</div></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Stats -->
    <div>
      <div class="sb-sec"><i class="bi bi-bar-chart-line"></i> 統計</div>
      <div class="sb-row"><span class="sb-lbl">學習點</span><span class="sb-val" style="color:var(--info)" id="sb-sp">8</span></div>
      <div class="sb-row"><span class="sb-lbl">已解鎖</span><span class="sb-val" style="color:var(--attention)" id="sb-ul">2</span></div>
      <div class="sb-row"><span class="sb-lbl">可解鎖</span><span class="sb-val" style="color:var(--info)" id="sb-av">3</span></div>
      <div class="sb-row"><span class="sb-lbl">總節點</span><span class="sb-val" style="color:#2e2f2c">12</span></div>
    </div>

    <div class="divider"></div>

    <!-- ── Controls ── -->
    <div>
      <div class="sb-sec"><i class="bi bi-palette2"></i> 外觀設定</div>
      <div class="ctrl-panel">

        <!-- Theme -->
        <div class="ctrl-row">
          <span class="ctrl-label">主題</span>
          <div class="theme-btns" id="theme-btns">
            <button class="theme-btn active" data-theme="default" title="預設（info/attention）" style="background:linear-gradient(135deg,#90CDF4,#E5E5A6)"></button>
            <button class="theme-btn" data-theme="ocean"  title="海洋（sky/safe）"  style="background:linear-gradient(135deg,#04b5a3,#81E6D9)"></button>
            <button class="theme-btn" data-theme="ember"  title="琥珀（orange/brown）" style="background:linear-gradient(135deg,#f69653,#d9b375)"></button>
            <button class="theme-btn" data-theme="violet" title="紫羅蘭（lavender/pink）" style="background:linear-gradient(135deg,#C3A5E5,#FFB3D9)"></button>
            <button class="theme-btn" data-theme="nature" title="自然（safe/special）" style="background:linear-gradient(135deg,#81E6D9,#C8DD5A)"></button>
            <button class="theme-btn" data-theme="blood"  title="血月（warning/salmon）" style="background:linear-gradient(135deg,#F08080,#E5C3B3)"></button>
          </div>
        </div>

        <!-- Scale -->
        <div class="ctrl-row">
          <span class="ctrl-label">整體縮放</span>
          <div class="slider-wrap">
            <input type="range" class="slider" id="scale-slider" min="0.7" max="1.6" step="0.05" value="1">
            <span class="slider-val" id="scale-val">1.0×</span>
          </div>
        </div>

        <!-- Font size -->
        <div class="ctrl-row">
          <span class="ctrl-label">字體大小</span>
          <div class="slider-wrap">
            <input type="range" class="slider" id="font-slider" min="0.7" max="1.5" step="0.05" value="1">
            <span class="slider-val" id="font-val">1.0×</span>
          </div>
        </div>

      </div>
    </div>

    <div class="divider"></div>

    <!-- Achievement -->
    <div>
      <div class="sb-sec"><i class="bi bi-award-fill" style="color:var(--special)"></i> 成就</div>
      <button class="ach-sidebar-btn" onclick="ach.togglePanel()">
        <span><i class="bi bi-award"></i> 開啟成就面板</span>
        <span class="ach-sidebar-count" id="sb-ach-count">0</span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Log -->
    <div>
      <div class="sb-sec"><i class="bi bi-terminal"></i> 記錄</div>
      <div class="log-box" id="log-box">
        <div class="log-entry info">▸ 點擊藍色節點開始學習</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Legend -->
    <div>
      <div class="sb-sec"><i class="bi bi-palette"></i> 圖例</div>
      <div class="legend">
        <div class="legend-row"><div class="legend-sw" style="background:linear-gradient(145deg,#0e1e2a,#081420);border-color:#90CDF4"></div>可解鎖（info）</div>
        <div class="legend-row"><div class="legend-sw" style="background:linear-gradient(145deg,#2a2a14,#1a1a0c);border-color:#E5E5A6"></div>已解鎖（attention）</div>
        <div class="legend-row"><div class="legend-sw" style="background:linear-gradient(145deg,#1c1d1c,#141514);border-color:#3a3b38"></div>鎖定（shell）</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Ops -->
    <div>
      <div class="sb-sec"><i class="bi bi-sliders"></i> 操作</div>
      <div class="btn-row">
        <button class="btn gold" onclick="addPoints(3)"><i class="bi bi-plus-circle"></i> +3點</button>
        <button class="btn danger" onclick="doReset()"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
      </div>
    </div>

  </aside>
</div>

<!-- ── tech-tree.js ── -->
<script>
(function (G) {
  'use strict';

  function deepMerge(target) {
    for (var i = 1; i < arguments.length; i++) {
      var src = arguments[i];
      if (!src || typeof src !== 'object') continue;
      Object.keys(src).forEach(function(k) {
        if (src[k] !== null && !Array.isArray(src[k]) && typeof src[k] === 'object') {
          if (typeof target[k] !== 'object' || target[k] === null) target[k] = {};
          deepMerge(target[k], src[k]);
        } else if (src[k] !== undefined) {
          target[k] = src[k];
        }
      });
    }
    return target;
  }

  function svgEl(tag, attrs) {
    var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    Object.keys(attrs || {}).forEach(function(k){ el.setAttribute(k, String(attrs[k])); });
    return el;
  }

  function scaleRem(val, factor) {
    var m = String(val).match(/^([\d.]+)(rem|em|px)$/);
    if (!m || factor === 1) return val;
    return (parseFloat(m[1]) * factor).toFixed(3) + m[2];
  }

  // ── Defaults ─────────────────────────────────────────────────────────
  var _D = {
    nodeSize: 64, nodeGap: 52, padding: 44,
    dotRadius: 4, dotCount: 3, lineWidth: 1.5, cornerRadius: 8,
    scale: 1,
    typography: {
      nodeLabel:    '0.74rem',
      nodeBadge:    '0.62rem',
      tooltipTitle: '0.92rem',
      tooltipDesc:  '0.80rem',
      tooltipMeta:  '0.70rem',
      headerTitle:  '0.94rem',
      headerSub:    '0.72rem',
      footer:       '0.64rem',
    },
    showLabels: true, showTooltip: true, showScrews: true,
    title: null, subtitle: null, footer: null,
    themeName: 'default',
    theme: { screwColor:'#3a3b38', labelColor:'#7a7b78', lineColor:'#3a3b38',
             wrapperBg:'#1a1b1a', wrapperBorder:'1px solid #2e2f2e' },
    states: {
      unlocked:  { bg:'linear-gradient(145deg,#2a2a14,#1a1a0c)', border:'#E5E5A6', icon:'#E5E5A6', dot:'#E5E5A6', shadow:'rgba(229,229,166,.35)', indicator:'#E5E5A6' },
      available: { bg:'linear-gradient(145deg,#0e1e2a,#081420)', border:'#90CDF4', icon:'#90CDF4', dot:'#90CDF4', shadow:'rgba(144,205,244,.40)', indicator:'#90CDF4', pulse:'rgba(144,205,244,.65)' },
      locked:    { bg:'linear-gradient(145deg,#1c1d1c,#141514)', border:'#4a4b48', icon:'#7a7b78', dot:'#3a3b38', shadow:'rgba(0,0,0,.4)',          indicator:'#3a3b38' },
      empty:     { bg:'linear-gradient(145deg,#181918,#101110)', border:'#222322', icon:'#3a3b38', dot:'#222322', shadow:'rgba(0,0,0,.3)',          indicator:'#1a1b18' },
      disabled:  { bg:'#0e0f0e',                                 border:'#181918', icon:'#303130', dot:'#181918', shadow:'none',                   indicator:'#141514' },
    },
    onNodeClick: null, onNodeHover: null,
  };

  // ── Built-in themes ───────────────────────────────────────────────────
  var _THEMES = {
    default: {
      theme: { lineColor:'#3a3b38', labelColor:'#7a7b78', screwColor:'#3a3b38', wrapperBg:'#1a1b1a', wrapperBorder:'1px solid #2e2f2e' },
      states: {
        unlocked:  { bg:'linear-gradient(145deg,#2a2a14,#1a1a0c)', border:'#E5E5A6', icon:'#E5E5A6', dot:'#E5E5A6', shadow:'rgba(229,229,166,.35)', indicator:'#E5E5A6' },
        available: { bg:'linear-gradient(145deg,#0e1e2a,#081420)', border:'#90CDF4', icon:'#90CDF4', dot:'#90CDF4', shadow:'rgba(144,205,244,.40)', indicator:'#90CDF4', pulse:'rgba(144,205,244,.65)' },
      },

    ocean: {

      states: {
        unlocked:  { bg:'linear-gradient(145deg,#0a2828,#061818)', border:'#81E6D9', icon:'#81E6D9', dot:'#81E6D9', shadow:'rgba(129,230,217,.35)', indicator:'#81E6D9' },
        available: { bg:'linear-gradient(145deg,#061e1e,#041414)', border:'#04b5a3', icon:'#04b5a3', dot:'#04b5a3', shadow:'rgba(4,181,163,.45)',   indicator:'#04b5a3', pulse:'rgba(4,181,163,.6)' },
      },
    },
    ember: {
      theme: { lineColor:'#3a2818', labelColor:'#9a7848', screwColor:'#3a2818', wrapperBg:'#1a1208', wrapperBorder:'1px solid #3a2818' },
      states: {
        unlocked:  { bg:'linear-gradient(145deg,#2a1a08,#1a1004)', border:'#d9b375', icon:'#d9b375', dot:'#d9b375', shadow:'rgba(217,179,117,.35)', indicator:'#d9b375' },
        available: { bg:'linear-gradient(145deg,#2a1408,#1a0c04)', border:'#f69653', icon:'#f69653', dot:'#f69653', shadow:'rgba(246,150,83,.45)',  indicator:'#f69653', pulse:'rgba(246,150,83,.6)' },
      },
    },
    violet: {
      theme: { lineColor:'#2a1e38', labelColor:'#7a6098', screwColor:'#2a1e38', wrapperBg:'#130f1c', wrapperBorder:'1px solid #2a1e38' },
      states: {
        unlocked:  { bg:'linear-gradient(145deg,#1e1430,#14102a)', border:'#FFB3D9', icon:'#FFB3D9', dot:'#FFB3D9', shadow:'rgba(255,179,217,.30)', indicator:'#FFB3D9' },
        available: { bg:'linear-gradient(145deg,#1a1230,#100e28)', border:'#C3A5E5', icon:'#C3A5E5', dot:'#C3A5E5', shadow:'rgba(195,165,229,.40)', indicator:'#C3A5E5', pulse:'rgba(195,165,229,.6)' },

    nature: {

      states: {
        unlocked:  { bg:'linear-gradient(145deg,#1a2e10,#101e08)', border:'#C8DD5A', icon:'#C8DD5A', dot:'#C8DD5A', shadow:'rgba(200,221,90,.35)',  indicator:'#C8DD5A' },
        available: { bg:'linear-gradient(145deg,#0a2018,#061410)', border:'#81E6D9', icon:'#81E6D9', dot:'#81E6D9', shadow:'rgba(129,230,217,.40)', indicator:'#81E6D9', pulse:'rgba(129,230,217,.6)' },
      },
    },
    blood: {
      theme: { lineColor:'#3a1818', labelColor:'#9a5858', screwColor:'#3a1818', wrapperBg:'#180a0a', wrapperBorder:'1px solid #3a1818' },
      states: {
        unlocked:  { bg:'linear-gradient(145deg,#2a1414,#1a0c0c)', border:'#E5C3B3', icon:'#E5C3B3', dot:'#E5C3B3', shadow:'rgba(229,195,179,.30)', indicator:'#E5C3B3' },
        available: { bg:'linear-gradient(145deg,#2a0e0e,#1a0808)', border:'#F08080', icon:'#F08080', dot:'#F08080', shadow:'rgba(240,128,128,.45)',  indicator:'#F08080', pulse:'rgba(240,128,128,.6)' },
      },
    },
  };

  // ╔═══════════════════════════════════════════════════════╗
  // ║  TechTree                                             ║
  // ╚═══════════════════════════════════════════════════════╝
  function TechTree(selector, options) {
    options = options || {};
    this.mountEl = typeof selector === 'string'
      ? document.querySelector(selector) : selector;
    if (!this.mountEl) throw new Error('TechTree: "' + selector + '" not found');

    var attrCfg = {};
    try { var r = this.mountEl.getAttribute('data-tt-config'); if (r) attrCfg = JSON.parse(r); } catch(_) {}

    var name      = options.themeName || attrCfg.themeName || (G.TechTreeConfig && G.TechTreeConfig.themeName) || 'default';
    var themeData = TechTree.themes[name] || TechTree.themes['default'];

    this.cfg = deepMerge({}, _D, themeData, G.TechTreeConfig || {}, attrCfg, options);
    this.cfg.themeName = name;
    this._nodes   = (options.nodes || []).map(function(n){ return Object.assign({},n); });
    this._edges   = (options.edges || []).map(function(e){ return Object.assign({},e); });
    this._nodeMap = {};
    this._nodes.forEach(function(n){ this._nodeMap[n.id]=n; }, this);
    TechTree._injectCSS();
    this._initTooltip();
    this.render();
  }

  TechTree.themes = _THEMES;
  TechTree.registerTheme = function(name, cfg) { TechTree.themes[name] = cfg; };

  // ── API ────────────────────────────────────────────────────────────
  TechTree.prototype.render        = function()         { this.mountEl.innerHTML=''; this._buildDOM(); };
  TechTree.prototype.setTheme      = function(name)     { var t=TechTree.themes[name]; if(!t){console.warn('TechTree: unknown theme "'+name+'"'); return;} deepMerge(this.cfg, t); this.cfg.themeName=name; this.render(); };
  TechTree.prototype.setScale      = function(s)        { this.cfg.scale=s; this.render(); };
  TechTree.prototype.setTypography = function(t)        { deepMerge(this.cfg.typography, t); this.render(); };
  TechTree.prototype.setNodeState  = function(id,st)    { var n=this._nodeMap[id]; if(n){n.state=st; this.render();} };
  TechTree.prototype.updateNode    = function(id,props) { var n=this._nodeMap[id]; if(n){Object.assign(n,props); this.render();} };
  TechTree.prototype.setEdgeState  = function(f,t,st)   { var e=this._edges.find(function(e){return e.from===f&&e.to===t;}); if(e){e.state=st; this.render();} };
  TechTree.prototype.batchUpdate   = function(fn)       { fn(this._nodeMap, this._edges); this.render(); };
  TechTree.prototype.getNode       = function(id)       { var n=this._nodeMap[id]; return n?Object.assign({},n):null; };
  TechTree.prototype.getNodesByState = function(st)     { return this._nodes.filter(function(n){return n.state===st;}).map(function(n){return Object.assign({},n);}); };
  TechTree.prototype.destroy       = function()         { this.mountEl.innerHTML=''; };

  // ── Helpers ────────────────────────────────────────────────────────
  TechTree.prototype._sc = function(v) { return v * (this.cfg.scale||1); };
  TechTree.prototype._fs = function(key) {
    var v = this.cfg.typography && this.cfg.typography[key] || _D.typography[key];
    return scaleRem(v, this.cfg.scale||1);
  };

  // ── Build DOM ──────────────────────────────────────────────────────
  TechTree.prototype._buildDOM = function() {
    var sc    = this._sc.bind(this);
    var pad   = sc(this.cfg.padding);
    var nSz   = sc(this.cfg.nodeSize);
    var nGap  = sc(this.cfg.nodeGap);
    var lblH  = this.cfg.showLabels ? sc(26) : 0;
    var maxC=0, maxR=0;
    this._nodes.forEach(function(n){ maxC=Math.max(maxC,n.col||0); maxR=Math.max(maxR,n.row||0); });
    var W = pad*2 + (maxC+1)*nSz + maxC*nGap;
    var H = pad*2 + (maxR+1)*nSz + maxR*nGap + lblH;

    var wrap = document.createElement('article');
    wrap.className='tt-wrap';
    wrap.setAttribute('role','region');
    wrap.setAttribute('aria-label', this.cfg.title||'科技樹');
    wrap.style.background = this.cfg.theme.wrapperBg||'#1a1b1a';
    wrap.style.border     = this.cfg.theme.wrapperBorder||'1px solid #2e2f2e';

    if (this.cfg.title || this.cfg.subtitle) {
      var hdr=document.createElement('header'); hdr.className='tt-hdr';
      if (this.cfg.title) {
        var h=document.createElement('h3'); h.className='tt-hdr-title';
        h.style.fontSize=this._fs('headerTitle'); h.textContent=this.cfg.title; hdr.appendChild(h);
      }
      if (this.cfg.subtitle) {
        var p=document.createElement('p'); p.className='tt-hdr-sub';
        p.style.fontSize=this._fs('headerSub'); p.textContent=this.cfg.subtitle; hdr.appendChild(p);
      }
      wrap.appendChild(hdr);
    }

    var board=document.createElement('div'); board.className='tt-board';
    board.style.width=W+'px'; board.style.height=H+'px';

    if (this.cfg.showScrews) {
      var screwC=this.cfg.theme.screwColor||'#3a3b38';
      [['a',8,8],['b',8,W-18],['c',H-18,8],['d',H-18,W-18]].forEach(function(p){
        var s=document.createElement('div'); s.className='tt-screw'; s.setAttribute('aria-hidden','true');
        s.style.cssText='top:'+p[1]+'px;left:'+p[2]+'px;';
        s.innerHTML='<svg width="10" height="10" aria-hidden="true">'
          +'<circle cx="5" cy="5" r="4.5" fill="url(#ttsg'+p[0]+')" stroke="'+screwC+'" stroke-width="0.8"/>'
          +'<line x1="2.5" y1="5" x2="7.5" y2="5" stroke="'+screwC+'" stroke-width="1"/>'
          +'<line x1="5" y1="2.5" x2="5" y2="7.5" stroke="'+screwC+'" stroke-width="1"/>'
          +'<defs><radialGradient id="ttsg'+p[0]+'" cx="35%" cy="35%">'
          +'<stop offset="0%" stop-color="#3a3b38"/><stop offset="100%" stop-color="#1a1b18"/>'
          +'</radialGradient></defs></svg>';
        board.appendChild(s);
      });
    }

    var svg=svgEl('svg',{width:W,height:H,class:'tt-svg','aria-hidden':'true'});
    var self=this;
    this._edges.forEach(function(e){ self._drawEdge(svg,e); });
    board.appendChild(svg);
    this._nodes.forEach(function(n){ board.appendChild(self._makeNode(n)); });
    wrap.appendChild(board);

    if (this.cfg.footer) {
      var ft=document.createElement('footer'); ft.className='tt-footer';
      ft.style.fontSize=this._fs('footer'); ft.textContent=this.cfg.footer; wrap.appendChild(ft);
    }
    this.mountEl.appendChild(wrap);
  };

  TechTree.prototype._pos = function(n) {
    var pad=this._sc(this.cfg.padding), nSz=this._sc(this.cfg.nodeSize), nGap=this._sc(this.cfg.nodeGap);
    var col=n.col||0, row=n.row||0;
    var cx=pad+col*(nSz+nGap)+nSz/2, cy=pad+row*(nSz+nGap)+nSz/2;
    var sz=nSz*(n.size||1);
    return {x:cx-sz/2,y:cy-sz/2,cx:cx,cy:cy,sz:sz};
  };

  TechTree.prototype._drawEdge = function(svg, edge) {
    var fn=this._nodeMap[edge.from], tn=this._nodeMap[edge.to];
    if (!fn||!tn) return;
    var fp=this._pos(fn), tp=this._pos(tn);
    var state=edge.state||'locked';
    var sc=this.cfg.states[state]||this.cfg.states.locked;
    var lineColor=this.cfg.theme.lineColor||'#3a3b38';
    var g=svgEl('g',{class:'tt-edge tt-edge--'+state,'data-from':edge.from,'data-to':edge.to});
    g.appendChild(svgEl('line',{x1:fp.cx,y1:fp.cy,x2:tp.cx,y2:tp.cy,
      stroke:lineColor,'stroke-width':this._sc(this.cfg.lineWidth),'stroke-linecap':'round'}));
    var tot=edge.dotCount||this.cfg.dotCount;
    var filled=edge.dotsFilled!==undefined?edge.dotsFilled:
      state==='unlocked'?tot:state==='available'?Math.ceil(tot/2):0;
    for (var i=1;i<=tot;i++) {
      var t=i/(tot+1);
      g.appendChild(svgEl('circle',{
        cx:fp.cx+(tp.cx-fp.cx)*t, cy:fp.cy+(tp.cy-fp.cy)*t,
        r:this._sc(this.cfg.dotRadius),
        fill:i<=filled?sc.dot:'#232423',
        class:'tt-dot'+(i<=filled?' tt-dot--on':''),
      }));
    }
    if (edge.label) {
      var tx=svgEl('text',{x:(fp.cx+tp.cx)/2,y:(fp.cy+tp.cy)/2-7,
        'text-anchor':'middle',fill:'#3a3b38','font-size':'9','font-family':'monospace'});
      tx.textContent=edge.label; g.appendChild(tx);
    }
    svg.appendChild(g);
  };

  TechTree.prototype._makeNode = function(node) {
    var pos=this._pos(node), state=node.state||'locked';
    var sc=this.cfg.states[state]||this.cfg.states.locked;
    var sz=pos.sz, cr=this._sc(this.cfg.cornerRadius)*(node.size||1);

    var wrap=document.createElement('div');
    wrap.className='tt-node-wrap';
    wrap.style.cssText='position:absolute;left:'+pos.x+'px;top:'+pos.y+'px;';

    var el=document.createElement('div');
    el.className='tt-node tt-node--'+state;
    el.setAttribute('data-id',node.id);
    el.setAttribute('data-state',state);
    el.setAttribute('role',state==='disabled'?'img':'button');
    el.setAttribute('tabindex',(state==='disabled'||state==='locked')?'-1':'0');
    el.setAttribute('aria-label',[node.label,node.tooltip].filter(Boolean).join('：')||node.id);
    if (state==='locked'||state==='disabled') el.setAttribute('aria-disabled','true');
    el.style.cssText='width:'+sz+'px;height:'+sz+'px;border-radius:'+cr+'px;'
      +'background:'+sc.bg+';border:2px solid '+sc.border+';'
      +'box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 4px 16px '+sc.shadow+';'
      +'display:flex;align-items:center;justify-content:center;position:relative;'
      +'cursor:'+(state==='available'?'pointer':state==='unlocked'?'default':'not-allowed')+';'
      +'transition:filter .15s,transform .15s;user-select:none;';

    if (node.icon) {
      var ic=document.createElement('i'); ic.className='bi '+node.icon;
      ic.style.cssText='font-size:'+Math.round(sz*.42)+'px;color:'+sc.icon+';pointer-events:none;';
      el.appendChild(ic);
    } else {
      var fb=document.createElement('span');
      fb.style.cssText='font-size:'+Math.round(sz*.34)+'px;color:'+sc.icon
        +';pointer-events:none;font-family:\'Exo 2\',monospace;font-weight:700;';
      fb.textContent=(node.label||node.id).slice(0,1); el.appendChild(fb);
    }

    var ind=document.createElement('span'); ind.className='tt-indicator'; ind.setAttribute('aria-hidden','true');
    ind.style.cssText='position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;'
      +'background:'+sc.indicator+';box-shadow:0 0 6px '+sc.indicator+'90;';
    el.appendChild(ind);

    if (node.level!==undefined) {
      var lv=document.createElement('span'); lv.className='tt-lvbadge';
      lv.textContent=node.level; lv.setAttribute('aria-label','等級 '+node.level);
      lv.style.cssText='position:absolute;top:-8px;left:-8px;background:'+sc.border+';color:#0c0d0c;'
        +'font-size:'+this._fs('nodeBadge')+';font-weight:800;min-width:16px;height:16px;padding:0 3px;'
        +'border-radius:8px;display:flex;align-items:center;justify-content:center;'
        +'border:1.5px solid #0c0d0c;font-family:\'Exo 2\',monospace;';
      el.appendChild(lv);
    }

    if (node.badge) {
      var bg2=document.createElement('span'); bg2.className='tt-custbadge'; bg2.textContent=node.badge;
      bg2.setAttribute('aria-hidden','true');
      bg2.style.cssText='position:absolute;bottom:-9px;right:-9px;background:#C8DD5A;color:#0c0d0c;'
        +'font-size:'+this._fs('nodeBadge')+';font-weight:800;padding:1px 4px;border-radius:3px;'
        +'text-transform:uppercase;letter-spacing:.04em;font-family:\'Exo 2\',monospace;';
      el.appendChild(bg2);
    }

    wrap.appendChild(el);

    if (this.cfg.showLabels && node.label) {
      var lbl=document.createElement('div'); lbl.className='tt-label'; lbl.textContent=node.label;
      lbl.setAttribute('aria-hidden','true');
      var lblCol=(state==='unlocked'||state==='available')?sc.icon:(this.cfg.theme.labelColor||'#6a6b68');
      lbl.style.cssText='position:absolute;top:'+(sz+5)+'px;left:50%;transform:translateX(-50%);'
        +'font-size:'+this._fs('nodeLabel')+';color:'+lblCol+';'
        +'white-space:nowrap;pointer-events:none;text-align:center;'
        +'max-width:'+(sz+36)+'px;overflow:hidden;text-overflow:ellipsis;'
        +'font-family:\'Share Tech Mono\',monospace;';
      wrap.appendChild(lbl);
    }

    this._bindNodeEvents(el, node);
    return wrap;
  };

  TechTree.prototype._bindNodeEvents = function(el, node) {
    var state=node.state||'locked', self=this;
    if (state==='disabled') return;
    el.addEventListener('mouseenter',function(e){
      if (state==='available'){ el.style.filter='brightness(1.35)'; el.style.transform='scale(1.08)'; el.style.zIndex='10'; }
      else if (state==='unlocked'){ el.style.filter='brightness(1.12)'; el.style.zIndex='5'; }
      if (self.cfg.showTooltip) self._showTT(node,e);
      if (self.cfg.onNodeHover) self.cfg.onNodeHover(node,e,self);
    });
    el.addEventListener('mousemove',function(e){ self._moveTT(e); });
    el.addEventListener('mouseleave',function(){ el.style.filter=''; el.style.transform=''; el.style.zIndex=''; self._hideTT(); });
    if (state!=='locked') {
      var handler=function(e){ if (self.cfg.onNodeClick) self.cfg.onNodeClick(node,e,self); };
      el.addEventListener('click',handler);
      el.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();handler(e);} });
    }
  };

  TechTree.prototype._initTooltip = function() {
    var t=document.getElementById('tt-global-tooltip');
    if (!t) {
      t=document.createElement('div'); t.id='tt-global-tooltip'; t.setAttribute('role','tooltip');
      t.style.cssText='position:fixed;display:none;z-index:9999;background:#111211;'
        +'border:1px solid #2a2b28;color:#c6c7bd;padding:10px 14px;border-radius:8px;'
        +'max-width:260px;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.75);'
        +'line-height:1.5;font-family:\'Exo 2\',\'Segoe UI\',sans-serif;';
      document.body.appendChild(t);
    }
    this._tt=t;
  };

  TechTree.prototype._showTT = function(node,e) {
    if (!this._tt) return;
    var LABELS={unlocked:'已解鎖',available:'可解鎖',locked:'鎖定',empty:'空節點',disabled:'停用'};
    var st=node.state||'locked', sc=this.cfg.states[st]||this.cfg.states.locked, col=sc.indicator||'#3a3b38';
    var h='';
    if (node.label) h+='<strong style="color:#c6c7bd;font-size:'+this._fs('tooltipTitle')+'">'+node.label+'</strong>';
    if (node.level!==undefined) h+=' <span style="color:'+col+';font-size:'+this._fs('tooltipMeta')+';font-family:\'Share Tech Mono\',monospace">Lv.'+node.level+'</span>';
    if (node.tooltip) h+='<br><span style="color:#9a9b98;font-size:'+this._fs('tooltipDesc')+';margin-top:3px;display:block">'+node.tooltip+'</span>';
    if (node.cost!==undefined) h+='<br><span style="color:#C8DD5A;font-size:'+this._fs('tooltipMeta')+'">⬡ 消耗：'+node.cost+' 點</span>';
    if (node.requires) h+='<br><span style="color:#F08080;font-size:'+this._fs('tooltipMeta')+'">▸ 需要：'+node.requires+'</span>';
    h+='<br><span style="display:inline-flex;align-items:center;gap:5px;margin-top:4px">'
      +'<span style="width:6px;height:6px;border-radius:50%;background:'+col+';box-shadow:0 0 5px '+col+'88;display:inline-block"></span>'
      +'<span style="font-size:'+this._fs('tooltipMeta')+';color:#6a6b68;font-family:\'Share Tech Mono\',monospace;text-transform:uppercase">'+(LABELS[st]||st)+'</span></span>';
    this._tt.innerHTML=h; this._tt.style.display='block'; this._moveTT(e);
  };

  TechTree.prototype._moveTT = function(e) {
    if (!this._tt||this._tt.style.display==='none') return;
    var x=e.clientX+16,y=e.clientY-8,tw=this._tt.offsetWidth,vw=window.innerWidth;
    this._tt.style.left=(x+tw>vw-10?x-tw-32:x)+'px'; this._tt.style.top=Math.max(8,y)+'px';
  };

  TechTree.prototype._hideTT = function() { if(this._tt)this._tt.style.display='none'; };

  TechTree._injectCSS = function() {
    if (document.getElementById('tt-core-css')) return;
    var s=document.createElement('style'); s.id='tt-core-css';
    s.textContent='.tt-wrap{display:inline-block;border-radius:16px;padding:14px;'
      +'box-shadow:0 12px 48px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.03),inset 0 -1px 0 rgba(0,0,0,.4);}'
      +'.tt-hdr{padding:2px 4px 10px;border-bottom:1px solid #1e1f1e;margin-bottom:12px;}'
      +'.tt-hdr-title{color:#c6c7bd;font-weight:700;font-family:\'Exo 2\',sans-serif;margin:0;}'
      +'.tt-hdr-sub{color:#5a5b58;margin:3px 0 0;font-family:\'Share Tech Mono\',monospace;}'
      +'.tt-board{position:relative;border-radius:10px;overflow:visible;'
      +'background:radial-gradient(ellipse at 50% 30%,#1c1d1c 0%,#131413 100%);'
      +'box-shadow:inset 0 0 70px rgba(0,0,0,.5);}'
      +'.tt-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}'
      +'.tt-screw{position:absolute;width:10px;height:10px;z-index:2;}'
      +'.tt-node-wrap{position:absolute;z-index:1;}'
      +'.tt-node{position:relative;}'
      +'.tt-node--available{animation:tt-pulse 2.2s ease-in-out infinite;}'
      +'@keyframes tt-pulse{0%,100%{filter:none}50%{filter:brightness(1.18)}}'
      +'.tt-node--unlocked{animation:tt-glow 3.5s ease-in-out infinite;}'
      +'@keyframes tt-glow{0%,100%{filter:none}50%{filter:brightness(1.08)}}'
      +'.tt-node:not([aria-disabled]):focus-visible{outline:2px solid #90CDF4;outline-offset:3px;border-radius:10px;}'
      +'.tt-footer{padding:7px 4px 2px;color:#4a4b48;'
      +'font-family:\'Share Tech Mono\',monospace;border-top:1px solid #1a1b1a;margin-top:10px;}';
    document.head.appendChild(s);
  };

  G.TechTree = TechTree;
})(window);

</script>

<script>
(function (G) {
  'use strict';

  function deepMerge(target) {
    for (var i=1;i<arguments.length;i++) {
      var src=arguments[i];
      if (!src||typeof src!=='object') continue;
      Object.keys(src).forEach(function(k){
        if (src[k]!==null&&!Array.isArray(src[k])&&typeof src[k]==='object') {
          if (typeof target[k]!=='object'||target[k]===null) target[k]={};
          deepMerge(target[k],src[k]);
        } else if (src[k]!==undefined) target[k]=src[k];
      });
    }
    return target;
  }

  function scaleRem(val,factor) {
    var m=String(val).match(/^([\d.]+)(rem|em|px)$/);
    if (!m||factor===1) return val;
    return (parseFloat(m[1])*factor).toFixed(3)+m[2];
  }

  // ── Built-in themes ────────────────────────────────────────────────
  var _THEMES = {
    default: { accent:'#C8DD5A', accentText:'#0c0d0c', progressBg:'#C8DD5A', triggerColor:'#C8DD5A',
               panelBg:'#0e0f0e', panelBorder:'#1e1f1e', headerColor:'#c6c7bd', toastBorder:'#1e1f1e' },
    ocean:   { accent:'#04b5a3', accentText:'#0c0d0c', progressBg:'#81E6D9', triggerColor:'#04b5a3',
               panelBg:'#080f0e', panelBorder:'#0e2020', headerColor:'#81E6D9', toastBorder:'#0e2020' },
    ember:   { accent:'#f69653', accentText:'#0c0d0c', progressBg:'#d9b375', triggerColor:'#f69653',
               panelBg:'#0f0a06', panelBorder:'#2a1808', headerColor:'#d9b375', toastBorder:'#2a1808' },
    violet:  { accent:'#C3A5E5', accentText:'#0c0d0c', progressBg:'#FFB3D9', triggerColor:'#C3A5E5',
               panelBg:'#0c0810', panelBorder:'#1e1430', headerColor:'#FFB3D9', toastBorder:'#1e1430' },
    nature:  { accent:'#C8DD5A', accentText:'#0c0d0c', progressBg:'#81E6D9', triggerColor:'#81E6D9',
               panelBg:'#080e08', panelBorder:'#0e2010', headerColor:'#C8DD5A', toastBorder:'#0e2010' },
    blood:   { accent:'#F08080', accentText:'#0c0d0c', progressBg:'#E5C3B3', triggerColor:'#F08080',
               panelBg:'#0f0808', panelBorder:'#2a1010', headerColor:'#E5C3B3', toastBorder:'#2a1010' },
  };

  // ── Rarity config ─────────────────────────────────────────────────
  var RARITIES = {
    common:    { label:'普通', color:'#c6c7bd', glow:'rgba(198,199,189,.22)' },
    rare:      { label:'稀有', color:'#90CDF4', glow:'rgba(144,205,244,.30)' },
    epic:      { label:'史詩', color:'#C3A5E5', glow:'rgba(195,165,229,.30)' },
    legendary: { label:'傳說', color:'#C8DD5A', glow:'rgba(200,221,90,.36)'  },
  };

  // ── Defaults ──────────────────────────────────────────────────────
  var _D = {
    showList: true,
    panelSide: 'right',
    triggerPos: 'bottom-left',
    achievements: [],
    onUnlock: null,
    themeName: 'default',
    scale: 1,
    typography: {
      panelTitle:  '0.86rem',
      panelItem:   '0.80rem',
      panelDesc:   '0.70rem',
      panelMeta:   '0.63rem',
      toastTitle:  '0.86rem',
      toastDesc:   '0.70rem',
      toastEyebrow:'0.62rem',
      progressLabel:'0.66rem',
    },
  };

  // ╔═══════════════════════════════════════════════════════╗
  // ║  AchievementSystem                                    ║
  // ╚═══════════════════════════════════════════════════════╝
  function AchievementSystem(options) {
    options = options || {};
    var name      = options.themeName || (G.AchievementConfig&&G.AchievementConfig.themeName) || 'default';
    var themeData = AchievementSystem.themes[name] || AchievementSystem.themes['default'];

    this.cfg = deepMerge({}, _D, themeData ? { _themeData: themeData } : {}, G.AchievementConfig||{}, options);
    this._theme = deepMerge({}, _THEMES['default'], themeData||{});
    this.cfg.themeName = name;

    this._achievements = (options.achievements||[]).map(function(a){ return Object.assign({},a,{_unlocked:false,_unlockedAt:null}); });
    this._map = {};
    this._achievements.forEach(function(a){ this._map[a.id]=a; }, this);
    this._panelOpen = false;

    AchievementSystem._injectCSS();
    var self = this;
    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){ self._mount(); });
    else this._mount();
  }

  AchievementSystem.themes = _THEMES;
  AchievementSystem.registerTheme = function(name,cfg) { AchievementSystem.themes[name]=cfg; };

  // ── API ────────────────────────────────────────────────────────────
  AchievementSystem.prototype.check = function(ctx) {
    var newly=[], self=this;
    this._achievements.forEach(function(a){
      if (a._unlocked) return;
      var met=false;
      try { if (typeof a.condition==='function') met=!!a.condition(ctx); } catch(_){}
      if (met) { self._doUnlock(a,ctx); newly.push(a.id); }
    });
    if (newly.length) this._refreshPanel();
    return newly;
  };

  AchievementSystem.prototype.unlock = function(id) {
    var a=this._map[id]; if(a&&!a._unlocked){ this._doUnlock(a,{}); this._refreshPanel(); }
  };

  AchievementSystem.prototype.isUnlocked  = function(id) { return !!(this._map[id]&&this._map[id]._unlocked); };
  AchievementSystem.prototype.getAll      = function()   { return this._achievements.map(function(a){return Object.assign({},a);}); };
  AchievementSystem.prototype.getUnlocked = function()   { return this._achievements.filter(function(a){return a._unlocked;}).map(function(a){return Object.assign({},a);}); };
  AchievementSystem.prototype.showPanel   = function()   { this._panelOpen=true;  this._syncPanel(); };
  AchievementSystem.prototype.hidePanel   = function()   { this._panelOpen=false; this._syncPanel(); };
  AchievementSystem.prototype.togglePanel = function()   { this._panelOpen=!this._panelOpen; this._syncPanel(); };

  AchievementSystem.prototype.setShowList = function(v) { this.cfg.showList=!!v; this._refreshPanel(); };

  AchievementSystem.prototype.setTheme = function(name) {
    var t=AchievementSystem.themes[name];
    if (!t) { console.warn('AchievementSystem: unknown theme "'+name+'"'); return; }
    this._theme = deepMerge({}, _THEMES['default'], t);
    this.cfg.themeName=name;
    this._refreshPanel();
    if (this._triggerEl) {
      this._triggerEl.style.color=this._theme.triggerColor;
      this._triggerEl.style.borderColor=this._theme.panelBorder;
    }
  };

  AchievementSystem.prototype.setScale = function(s) { this.cfg.scale=s; this._refreshPanel(); };
  AchievementSystem.prototype.setTypography = function(t) { deepMerge(this.cfg.typography,t); this._refreshPanel(); };

  AchievementSystem.prototype.destroy = function() {
    if(this._triggerEl)this._triggerEl.remove();
    if(this._panelEl)this._panelEl.remove();
    if(this._toastEl)this._toastEl.remove();
  };

  // ── Helpers ────────────────────────────────────────────────────────
  AchievementSystem.prototype._fs = function(key) {
    var v=this.cfg.typography&&this.cfg.typography[key]||_D.typography[key];
    return scaleRem(v, this.cfg.scale||1);
  };

  AchievementSystem.prototype._mount = function() {
    this._buildToasts();
    this._buildTrigger();
    this._buildPanel();
  };

  AchievementSystem.prototype._doUnlock = function(a, ctx) {
    a._unlocked=true; a._unlockedAt=new Date();
    this._showToast(a);
    if (this.cfg.onUnlock) this.cfg.onUnlock(Object.assign({},a), ctx);
  };

  // ── Trigger ────────────────────────────────────────────────────────
  AchievementSystem.prototype._buildTrigger = function() {
    var pos=this.cfg.triggerPos||'bottom-left';
    var el=document.createElement('button');
    el.id='ach-trigger';
    el.className='ach-trigger ach-trigger--'+pos;
    el.setAttribute('aria-label','成就系統');
    el.setAttribute('title','成就');
    el.style.color=this._theme.triggerColor;
    el.innerHTML='<i class="bi bi-award-fill ach-trigger-icon"></i>'
      +'<span class="ach-trigger-badge" id="ach-badge" style="background:'+this._theme.accent+';color:'+this._theme.accentText+'">0</span>';
    var self=this;
    el.addEventListener('click',function(){ self.togglePanel(); });
    document.body.appendChild(el);
    this._triggerEl=el;
  };

  // ── Panel ──────────────────────────────────────────────────────────
  AchievementSystem.prototype._buildPanel = function() {
    var side=this.cfg.panelSide==='left'?'left':'right';
    var el=document.createElement('aside');
    el.id='ach-panel';
    el.className='ach-panel ach-panel--'+side;
    el.setAttribute('role','dialog'); el.setAttribute('aria-modal','false'); el.setAttribute('aria-label','成就清單');
    var self=this;
    document.addEventListener('click',function(e){
      if (self._panelOpen&&self._panelEl&&!self._panelEl.contains(e.target)&&!(self._triggerEl&&self._triggerEl.contains(e.target)))
        self.hidePanel();
    });
    document.body.appendChild(el);
    this._panelEl=el;
    this._refreshPanel();
  };

  AchievementSystem.prototype._refreshPanel = function() {
    if (!this._panelEl) return;
    var th=this._theme;
    var total=this._achievements.length;
    var ul=this._achievements.filter(function(a){return a._unlocked;}).length;
    var pct=total?Math.round(ul/total*100):0;

    var badge=document.getElementById('ach-badge');
    if (badge) { badge.textContent=ul; badge.style.background=th.accent; badge.style.color=th.accentText; }
    if (this._triggerEl) { if(ul>0)this._triggerEl.classList.add('has-items'); }

    this._panelEl.style.background = th.panelBg;
    this._panelEl.style.borderColor = th.panelBorder;

    var self=this;
    this._panelEl.innerHTML=''
      +'<header class="ach-panel-hdr" style="border-color:'+th.panelBorder+'">'
        +'<span class="ach-panel-title" style="color:'+th.headerColor+';font-size:'+this._fs('panelTitle')+'">'
          +'<i class="bi bi-award-fill" style="color:'+th.accent+'"></i> 成就</span>'
        +'<div class="ach-panel-controls">'
          +'<button class="ach-icon-btn" id="ach-toggle-list" title="'+(this.cfg.showList?'隱藏清單':'顯示清單')+'">'
            +'<i class="bi '+(this.cfg.showList?'bi-eye':'bi-eye-slash')+'"></i></button>'
          +'<button class="ach-icon-btn" id="ach-close-btn" title="關閉"><i class="bi bi-x-lg"></i></button>'
        +'</div>'
      +'</header>'
      +'<div class="ach-progress-track" style="background:'+th.panelBorder+'">'
        +'<div class="ach-progress-fill" style="width:'+pct+'%;background:'+th.progressBg+'"></div>'
      +'</div>'
      +'<div class="ach-prog-label" style="font-size:'+this._fs('progressLabel')+'">'
        +'<span style="color:'+th.accent+'">'+ul+'</span>'
        +'<span style="color:#5a5b58"> / '+total+'</span>'
        +'<span class="ach-prog-pct" style="color:'+th.accent+'">'+pct+'%</span>'
      +'</div>'
      +(this.cfg.showList ? this._renderList() : '<div class="ach-hidden-msg"><i class="bi bi-eye-slash"></i><span>成就清單已隱藏</span></div>');

    var closeBtn=document.getElementById('ach-close-btn');
    if (closeBtn) closeBtn.addEventListener('click',function(){ self.hidePanel(); });
    var toggleBtn=document.getElementById('ach-toggle-list');
    if (toggleBtn) toggleBtn.addEventListener('click',function(){ self.setShowList(!self.cfg.showList); });
  };

  AchievementSystem.prototype._renderList = function() {
    if (!this._achievements.length) return '<div class="ach-empty">尚無成就設定</div>';
    var ul=this._achievements.filter(function(a){return  a._unlocked;});
    var lk=this._achievements.filter(function(a){return !a._unlocked;});
    var th=this._theme, self=this;
    var html='<div class="ach-list-wrap">';
    if (ul.length) {
      html+='<div class="ach-group-hdr" style="font-size:'+this._fs('panelMeta')+'">'
        +'<i class="bi bi-check-circle-fill" style="color:'+th.accent+'"></i> 已解鎖（'+ul.length+'）</div>';
      ul.forEach(function(a){ html+=self._renderItem(a); });
    }
    if (lk.length) {
      html+='<div class="ach-group-hdr" style="font-size:'+this._fs('panelMeta')+';margin-top:4px">'
        +'<i class="bi bi-lock-fill" style="color:#5a5b58"></i> 未解鎖（'+lk.length+'）</div>';
      lk.forEach(function(a){ html+=self._renderItem(a); });
    }
    return html+'</div>';
  };

  AchievementSystem.prototype._renderItem = function(a) {
    var r=RARITIES[a.rarity||'common'];
    if (!a._unlocked&&a.secret)
      return '<div class="ach-item ach-item--secret">'
        +'<div class="ach-item-icon" style="border-color:#181918;color:#1e1f1e"><i class="bi bi-question-lg"></i></div>'
        +'<div class="ach-item-body"><div class="ach-item-title" style="color:#4a4b48;font-size:'+this._fs('panelItem')+'">??? 隱藏成就</div></div>'
        +'</div>';
    var isSpoiler=!a._unlocked&&!!a.spoiler;
    var icon  = isSpoiler?'bi-shield-lock-fill':(a.icon||'bi-award');
    var title = isSpoiler?'???':(a.title||a.id);
    var desc  = isSpoiler?'達成後揭曉…':(a.desc||'');
    var lockIcon= !a._unlocked?'<i class="bi bi-lock-fill" style="font-size:.55rem;color:#5a5b58;margin-left:3px"></i>':'';
    return '<div class="ach-item '+(a._unlocked?'ach-item--unlocked':'ach-item--locked')+'" data-id="'+a.id+'" role="listitem">'
      +'<div class="ach-item-icon" style="border-color:'+(a._unlocked?r.color:'#242524')+';'
        +'color:'+(a._unlocked?r.color:'#5a5b58')+';'
        +'box-shadow:'+(a._unlocked?'0 0 12px '+r.glow:'none')+'"><i class="bi '+icon+'"></i></div>'
      +'<div class="ach-item-body">'
        +'<div class="ach-item-title" style="color:'+(a._unlocked?'#c6c7bd':'#7a7b78')+';font-size:'+this._fs('panelItem')+'">'+title+lockIcon+'</div>'
        +(desc?'<div class="ach-item-desc" style="color:'+(a._unlocked?'#8a8b88':'#5a5b58')+';font-size:'+this._fs('panelDesc')+'">'+desc+'</div>':'')
        +'<div class="ach-item-meta" style="font-size:'+this._fs('panelMeta')+'">'
          +'<span class="ach-rarity" style="color:'+r.color+'">'+r.label+'</span>'
          +(a._unlocked&&a._unlockedAt?'<span class="ach-time">'+this._fmtTime(a._unlockedAt)+'</span>':'')
          +(a.reward&&a._unlocked?'<span class="ach-reward"><i class="bi bi-gift-fill"></i> '+a.reward+'</span>':'')
        +'</div>'
      +'</div>'
      +'</div>';
  };

  // ── Toast ──────────────────────────────────────────────────────────
  AchievementSystem.prototype._buildToasts = function() {
    var el=document.createElement('div'); el.id='ach-toasts'; el.className='ach-toasts';
    document.body.appendChild(el); this._toastEl=el;
  };

  AchievementSystem.prototype._showToast = function(a) {
    if (!this._toastEl) return;
    var r=RARITIES[a.rarity||'common'], th=this._theme;
    var toast=document.createElement('div');
    toast.className='ach-toast';
    toast.style.borderLeftColor=r.color;
    toast.style.background=th.panelBg;
    toast.style.borderColor=th.toastBorder;
    toast.style.borderLeftColor=r.color;
    toast.innerHTML=''
      +'<div class="ach-toast-icon" style="color:'+r.color+';border-color:'+r.color+'">'
        +'<i class="bi '+(a.icon||'bi-award-fill')+'"></i></div>'
      +'<div class="ach-toast-body">'
        +'<div class="ach-toast-eyebrow" style="font-size:'+this._fs('toastEyebrow')+'">'
          +'<span>成就解鎖</span><span class="ach-toast-rarity" style="color:'+r.color+'">'+r.label+'</span></div>'
        +'<div class="ach-toast-title" style="color:'+r.color+';font-size:'+this._fs('toastTitle')+'">'+(a.title||a.id)+'</div>'
        +(a.desc?'<div class="ach-toast-desc" style="font-size:'+this._fs('toastDesc')+'">'+a.desc+'</div>':'')
        +(a.reward?'<div class="ach-toast-reward" style="font-size:'+this._fs('toastDesc')+'"><i class="bi bi-gift-fill"></i> '+a.reward+'</div>':'')
      +'</div>';
    this._toastEl.appendChild(toast);
    requestAnimationFrame(function(){requestAnimationFrame(function(){toast.classList.add('ach-toast--show');});});
    var dur=a.rarity==='legendary'?4500:3200;
    setTimeout(function(){
      toast.classList.remove('ach-toast--show');
      setTimeout(function(){toast.remove();},420);
    },dur);
  };

  AchievementSystem.prototype._syncPanel = function() {
    if (!this._panelEl) return;
    if (this._panelOpen) this._panelEl.classList.add('ach-panel--open');
    else this._panelEl.classList.remove('ach-panel--open');
    this._refreshPanel();
  };

  AchievementSystem.prototype._fmtTime = function(d) {
    return d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  };

  // ── Static CSS ─────────────────────────────────────────────────────
  AchievementSystem._injectCSS = function() {
    if (document.getElementById('ach-core-css')) return;
    var s=document.createElement('style'); s.id='ach-core-css';
    s.textContent=''
      +'.ach-trigger{position:fixed;z-index:900;width:46px;height:46px;border-radius:50%;'
        +'background:#0e0f0e;border:1.5px solid #222322;font-size:1.2rem;'
        +'display:flex;align-items:center;justify-content:center;cursor:pointer;'
        +'box-shadow:0 4px 18px rgba(0,0,0,.7);transition:border-color .2s,box-shadow .2s;padding:0;}'
      +'.ach-trigger:hover,.ach-trigger.has-items{border-color:currentColor;box-shadow:0 4px 22px rgba(200,221,90,.28);}'
      +'.ach-trigger--bottom-left{bottom:24px;left:24px;}'
      +'.ach-trigger--bottom-right{bottom:24px;right:24px;}'
      +'.ach-trigger--top-left{top:64px;left:24px;}'
      +'.ach-trigger-badge{position:absolute;top:-5px;right:-5px;'
        +'font-size:.58rem;font-weight:800;min-width:16px;height:16px;padding:0 3px;'
        +'border-radius:8px;display:flex;align-items:center;justify-content:center;'
        +'font-family:\'Exo 2\',monospace;border:1.5px solid #0c0d0c;transition:transform .2s;}'
      +'.ach-panel{position:fixed;top:0;bottom:0;width:280px;z-index:850;'
        +'display:flex;flex-direction:column;overflow:hidden;'
        +'transition:transform .3s cubic-bezier(.4,0,.2,1);}'
      +'.ach-panel--right{right:0;border-left:1px solid;transform:translateX(100%);}'
      +'.ach-panel--left{left:0;border-right:1px solid;transform:translateX(-100%);}'
      +'.ach-panel--open{transform:translateX(0);box-shadow:-8px 0 40px rgba(0,0,0,.7);}'
      +'.ach-panel--left.ach-panel--open{box-shadow:8px 0 40px rgba(0,0,0,.7);}'
      +'.ach-panel-hdr{padding:13px 14px 10px;border-bottom:1px solid;'
        +'display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}'
      +'.ach-panel-title{font-weight:700;font-family:\'Exo 2\',sans-serif;display:flex;align-items:center;gap:7px;}'
      +'.ach-panel-controls{display:flex;align-items:center;gap:4px;}'
      +'.ach-icon-btn{background:none;border:none;color:#3a3b38;cursor:pointer;font-size:.82rem;'
        +'padding:3px 6px;border-radius:4px;transition:color .15s,background .15s;display:flex;align-items:center;}'
      +'.ach-icon-btn:hover{color:#c6c7bd;background:#181918;}'
      +'.ach-progress-track{height:2px;flex-shrink:0;}'
      +'.ach-progress-fill{height:100%;transition:width .6s ease;border-radius:0 1px 1px 0;}'
      +'.ach-prog-label{padding:5px 14px 6px;font-family:\'Share Tech Mono\',monospace;'
        +'display:flex;align-items:center;gap:6px;flex-shrink:0;}'
      +'.ach-prog-pct{margin-left:auto;font-weight:700;}'
      +'.ach-group-hdr{padding:7px 14px 4px;color:#6a6b68;text-transform:uppercase;letter-spacing:.1em;'
        +'font-family:\'Share Tech Mono\',monospace;display:flex;align-items:center;gap:6px;'
        +'border-top:1px solid #131413;flex-shrink:0;}'
      +'.ach-list-wrap{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#1a1b1a transparent;padding-bottom:16px;}'
      +'.ach-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid #111211;transition:background .15s;}'
      +'.ach-item:hover{background:#111211;}'
      +'.ach-item--locked{opacity:.44;}.ach-item--secret{opacity:.15;}.ach-item--unlocked{opacity:1;}'
      +'.ach-item-icon{width:34px;height:34px;border-radius:7px;border:1.5px solid;flex-shrink:0;'
        +'display:flex;align-items:center;justify-content:center;font-size:.95rem;'
        +'background:#0c0d0c;transition:box-shadow .25s;}'
      +'.ach-item-body{flex:1;min-width:0;}'
      +'.ach-item-title{font-weight:700;font-family:\'Exo 2\',sans-serif;'
        +'display:flex;align-items:center;gap:4px;margin-bottom:2px;line-height:1.3;}'
      +'.ach-item-desc{line-height:1.4;font-family:\'Share Tech Mono\',monospace;margin-bottom:4px;}'
      +'.ach-item-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}'
      +'.ach-rarity{font-family:\'Share Tech Mono\',monospace;text-transform:uppercase;letter-spacing:.08em;}'
      +'.ach-time{color:#5a5b58;font-family:\'Share Tech Mono\',monospace;}'
      +'.ach-reward{color:#C8DD5A;display:flex;align-items:center;gap:3px;font-family:\'Exo 2\',sans-serif;}'
      +'.ach-hidden-msg{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;'
        +'color:#4a4b48;font-family:\'Share Tech Mono\',monospace;flex-direction:column;padding:32px 16px;}'
      +'.ach-empty{padding:28px 16px;color:#4a4b48;text-align:center;font-family:\'Share Tech Mono\',monospace;}'
      +'.ach-toasts{position:fixed;top:60px;right:16px;z-index:9990;'
        +'display:flex;flex-direction:column;gap:8px;pointer-events:none;width:270px;}'
      +'.ach-toast{border:1px solid;border-left:3px solid;padding:10px 12px;'
        +'border-radius:0 8px 8px 0;display:flex;align-items:flex-start;gap:10px;'
        +'box-shadow:0 8px 36px rgba(0,0,0,.85);'
        +'opacity:0;transform:translateX(16px);transition:opacity .35s ease,transform .35s ease;pointer-events:auto;}'
      +'.ach-toast.ach-toast--show{opacity:1;transform:translateX(0);}'
      +'.ach-toast-icon{width:34px;height:34px;border-radius:7px;border:1.5px solid;'
        +'display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;background:#0c0d0c;}'
      +'.ach-toast-body{flex:1;min-width:0;}'
      +'.ach-toast-eyebrow{display:flex;align-items:center;justify-content:space-between;'
        +'color:#6a6b68;text-transform:uppercase;letter-spacing:.1em;font-family:\'Share Tech Mono\',monospace;margin-bottom:2px;}'
      +'.ach-toast-rarity{font-weight:700;}'
      +'.ach-toast-title{font-weight:700;font-family:\'Exo 2\',sans-serif;line-height:1.2;}'
      +'.ach-toast-desc{color:#8a8b88;margin-top:2px;line-height:1.3;font-family:\'Share Tech Mono\',monospace;}'
      +'.ach-toast-reward{color:#C8DD5A;margin-top:4px;display:flex;align-items:center;gap:4px;font-family:\'Exo 2\',sans-serif;}';
    document.head.appendChild(s);
  };

  G.AchievementSystem = AchievementSystem;
})(window);

</script>

<script>
/* ═══════════════════════════════════════════
   State
═══════════════════════════════════════════ */
var sp = 8;
var TOTAL = 12;
var currentTheme = 'default';
var fontScale = 1;

/* ── UI ─────────────────────────────────── */
function updateUI(t) {
  var ul  = t.getNodesByState('unlocked').length;
  var av  = t.getNodesByState('available').length;
  var pct = Math.round(ul/TOTAL*100);
  ['hdr-sp','sb-sp'].forEach(function(id){ document.getElementById(id).textContent=sp; });
  ['hdr-ul','sb-ul'].forEach(function(id){ document.getElementById(id).textContent=ul; });
  document.getElementById('sb-av').textContent = av;
  document.getElementById('ring-pct').textContent = pct+'%';
  var circ = 2*Math.PI*28;
  document.getElementById('ring-fg').setAttribute('stroke-dashoffset',(circ*(1-pct/100)).toFixed(2));
  if (pct>=100) document.getElementById('ring-fg').setAttribute('stroke','var(--special)');
}

function updateAchUI() {
  var cnt = ach.getUnlocked().length;
  document.getElementById('hdr-ach').textContent = cnt;
  document.getElementById('sb-ach-count').textContent = cnt;
}

function addLog(msg, type) {
  var box = document.getElementById('log-box');
  var d = document.createElement('div');
  d.className = 'log-entry'+(type?' '+type:'');
  d.textContent = msg;
  box.insertBefore(d, box.firstChild);
  while (box.children.length>22) box.lastChild.remove();
}

/* ═══════════════════════════════════════════
   TechTree data
═══════════════════════════════════════════ */
var NODES = [
  { id:'core-vocab',  col:1, row:0, state:'unlocked',  icon:'bi-book-fill',               label:'核心單字',  level:1, tooltip:'掌握 2000 個高頻核心詞彙，建立基礎閱讀與聽力理解能力。', cost:0 },
  { id:'speed-read',  col:3, row:0, state:'unlocked',  icon:'bi-lightning-fill',           label:'快速閱讀',  level:1, tooltip:'提升閱讀速度至 200 wpm，培養略讀與掃讀技巧。', cost:0 },
  { id:'acad-vocab',  col:0, row:1, state:'available', icon:'bi-journal-bookmark-fill',    label:'學術單字',           tooltip:'AWL 學術詞彙表（570 詞族），必備寫作與閱讀學術文章能力。', cost:2, requires:'核心單字' },
  { id:'core-colloc', col:2, row:1, state:'available', icon:'bi-link-45deg',               label:'核心搭配詞',          tooltip:'高頻 collocations 300+，自然英語表達的關鍵。', cost:2, requires:'核心單字' },
  { id:'long-sent',   col:4, row:1, state:'available', icon:'bi-distribute-vertical',      label:'長難句拆解',          tooltip:'拆解閱讀長難句主幹、從句與修飾語，提升 Reading Band。', cost:3, requires:'快速閱讀' },
  { id:'speak-colloc',col:1, row:2, state:'locked',    icon:'bi-chat-dots-fill',           label:'口說搭配詞',          tooltip:'口說 Part 1-3 高分搭配詞與話語連接詞。', cost:3, requires:'核心搭配詞' },
  { id:'write-colloc',col:3, row:2, state:'locked',    icon:'bi-pencil-square',            label:'寫作搭配詞',          tooltip:'學術寫作 Task 1/2 精準搭配詞，提升 Lexical Resource 分數。', cost:3, requires:'核心搭配詞' },
  { id:'simple-sent', col:0, row:3, state:'locked',    icon:'bi-terminal-fill',            label:'簡單句造句',          tooltip:'以核心動詞＋受詞結構穩固輸出基礎，是所有複雜句的地基。', cost:2, requires:'學術單字' },
  { id:'conj-sent',   col:2, row:3, state:'locked',    icon:'bi-arrows-collapse-vertical', label:'連接詞造句',          tooltip:'however / therefore / while 等連接詞的精準用法，提升 Coherence 分數。', cost:2, requires:'口說搭配詞' },
  { id:'deep-think',  col:4, row:3, state:'locked',    icon:'bi-lightbulb-fill',           label:'深度思考',            tooltip:'針對社會、教育、環境議題形成多角度論點，Speaking Part 3 與 Writing Task 2 必備。', cost:3, requires:'長難句拆解' },
  { id:'var-sent',    col:2, row:4, state:'locked',    icon:'bi-shuffle',                  label:'多樣化句構',          tooltip:'倒裝句、名詞子句、關係子句、分詞構句等，衝高 Grammatical Range。', cost:4, requires:'連接詞造句' },
  { id:'ielts',       col:2, row:5, state:'locked',    icon:'bi-trophy-fill',              label:'雅思高分',  badge:'目標', tooltip:'整合所有能力面向，衝刺 Overall Band 7.0+。', cost:5, requires:'全部技能' },
];

var EDGES = [
  { from:'core-vocab',   to:'acad-vocab',   state:'available', dotCount:3 },
  { from:'core-vocab',   to:'core-colloc',  state:'available', dotCount:3 },
  { from:'speed-read',   to:'long-sent',    state:'available', dotCount:3 },
  { from:'acad-vocab',   to:'simple-sent',  state:'locked',    dotCount:3 },
  { from:'core-colloc',  to:'speak-colloc', state:'locked',    dotCount:3 },
  { from:'core-colloc',  to:'write-colloc', state:'locked',    dotCount:3 },
  { from:'speak-colloc', to:'conj-sent',    state:'locked',    dotCount:3 },
  { from:'write-colloc', to:'conj-sent',    state:'locked',    dotCount:2 },
  { from:'long-sent',    to:'deep-think',   state:'locked',    dotCount:3 },
  { from:'simple-sent',  to:'conj-sent',    state:'locked',    dotCount:3 },
  { from:'conj-sent',    to:'var-sent',     state:'locked',    dotCount:4 },
  { from:'deep-think',   to:'var-sent',     state:'locked',    dotCount:3 },
  { from:'var-sent',     to:'ielts',        state:'locked',    dotCount:5 },
  { from:'write-colloc', to:'ielts',        state:'locked',    dotCount:4 },
  { from:'deep-think',   to:'ielts',        state:'locked',    dotCount:4 },
];

var PREREQS = {
  'acad-vocab':   ['core-vocab'],
  'core-colloc':  ['core-vocab'],
  'long-sent':    ['speed-read'],
  'speak-colloc': ['core-colloc'],
  'write-colloc': ['core-colloc'],
  'simple-sent':  ['acad-vocab'],
  'conj-sent':    ['speak-colloc','simple-sent'],
  'deep-think':   ['long-sent'],
  'var-sent':     ['conj-sent'],
  'ielts':        ['var-sent','write-colloc','deep-think'],
};

/* ═══════════════════════════════════════════
   Achievements
═══════════════════════════════════════════ */
var ACHIEVEMENTS = [
  { id:'first-step',       icon:'bi-play-circle-fill',       title:'踏上征途',   desc:'解鎖第一個技能節點。',              rarity:'common',    spoiler:false,
    condition: function(c){ return ['acad-vocab','core-colloc','long-sent'].some(function(x){return c.unlockedIds.indexOf(x)>=0;}); } },
  { id:'vocab-hunter',     icon:'bi-journal-bookmark-fill',  title:'詞彙獵人',   desc:'解鎖「學術單字」，踏入學術英語殿堂。', rarity:'rare', spoiler:false, reward:'+ 1 點',
    condition: function(c){ return c.unlockedIds.indexOf('acad-vocab')>=0; }, _reward:true },
  { id:'colloc-master',    icon:'bi-link-45deg',             title:'搭配詞大師', desc:'同時解鎖口說與寫作兩條搭配詞路線。',  rarity:'epic', spoiler:false, reward:'+ 2 點',
    condition: function(c){ return c.unlockedIds.indexOf('speak-colloc')>=0&&c.unlockedIds.indexOf('write-colloc')>=0; }, _reward:true },
  { id:'sentence-builder', icon:'bi-terminal-fill',          title:'句法工匠',   desc:'完成簡單句→連接詞兩個句法節點。',     rarity:'rare', spoiler:false,
    condition: function(c){ return c.unlockedIds.indexOf('simple-sent')>=0&&c.unlockedIds.indexOf('conj-sent')>=0; } },
  { id:'deep-reader',      icon:'bi-distribute-vertical',    title:'深度閱讀者', desc:'解鎖「長難句拆解」，能拆解任何學術長句。', rarity:'rare', spoiler:false,
    condition: function(c){ return c.unlockedIds.indexOf('long-sent')>=0; } },
  { id:'thinker',          icon:'bi-lightbulb-fill',         title:'思辨者',     desc:'解鎖「深度思考」，能對複雜議題多角度論點。', rarity:'epic', spoiler:false,
    condition: function(c){ return c.unlockedIds.indexOf('deep-think')>=0; } },
  { id:'frugal-learner',   icon:'bi-piggy-bank-fill',        title:'節儉學習者', desc:'學習點剩餘 1 點時仍成功解鎖一個技能。', rarity:'epic', spoiler:true, reward:'+ 3 點',
    condition: function(c){ return c.sp===1&&c.justUnlocked!=null; }, _reward:true },
  { id:'grammar-architect',icon:'bi-shuffle',                title:'文法建築師', desc:'解鎖「多樣化句構」，掌握所有句型結構。', rarity:'epic', spoiler:false,
    condition: function(c){ return c.unlockedIds.indexOf('var-sent')>=0; } },
  { id:'speed-run',        icon:'bi-stopwatch-fill',         title:'快速晉升',   desc:'在一次學習中連續解鎖 4 個節點。',    rarity:'epic', spoiler:true,
    condition: function(c){ return c.sessionUnlockedCount>=4; } },
  { id:'all-skills',       icon:'bi-stars',                  title:'全能學者',   desc:'解鎖全部 12 個基礎技能節點。',        rarity:'legendary', spoiler:false, reward:'+ 5 點',
    condition: function(c){ return c.unlockedCount>=12; }, _reward:true },
  { id:'ielts-conqueror',  icon:'bi-trophy-fill',            title:'雅思征服者', desc:'解鎖「雅思高分」目標節點！',          rarity:'legendary', spoiler:false, reward:'恭喜達成！',
    condition: function(c){ return c.unlockedIds.indexOf('ielts')>=0; } },
  { id:'perfect-run',      icon:'bi-gem',                    title:'完美通關',   desc:'解鎖所有節點後學習點仍剩餘 ≥ 5 點。', rarity:'legendary', secret:true, reward:'隱藏成就達成！',
    condition: function(c){ return c.unlockedCount>=12&&c.sp>=5; } },
];

/* ═══════════════════════════════════════════
   Init Achievement System
═══════════════════════════════════════════ */
var ach = new AchievementSystem({
  showList: true, triggerPos:'bottom-left', panelSide:'right',
  achievements: ACHIEVEMENTS,
  onUnlock: function(a, ctx) {
    addLog('🏆 成就：'+a.title+'（'+a.rarity+'）', 'gold');
    if (a._reward) {
      var bonus = parseInt(a.reward)||0;
      if (bonus>0) {
        sp += bonus;
        addLog('↑ 獎勵 +'+bonus+' 學習點', 'info');
        document.getElementById('hdr-sp').textContent = sp;
        document.getElementById('sb-sp').textContent  = sp;
      }
    }
    updateAchUI();
  },
});

/* ═══════════════════════════════════════════
   Init TechTree
═══════════════════════════════════════════ */
var tree;
var sessionUnlockedCount = 0;

function buildCtx(justUnlocked) {
  return {
    sp: sp, justUnlocked: justUnlocked,
    unlockedIds: tree.getNodesByState('unlocked').map(function(n){return n.id;}),
    unlockedCount: tree.getNodesByState('unlocked').length,
    sessionUnlockedCount: sessionUnlockedCount,
  };
}

function handleClick(node, e, t) {
  if (node.state==='unlocked'){ addLog('ℹ「'+node.label+'」已解鎖','info'); return; }
  if (node.state!=='available') return;
  var cost=node.cost||0;
  if (sp<cost){ addLog('✗ 學習點不足（需'+cost+'，餘'+sp+'）','err'); return; }
  t.batchUpdate(function(nm, edges) {
    nm[node.id].state='unlocked';
    sp -= cost; sessionUnlockedCount++;
    edges.forEach(function(ed){
      if (ed.to===node.id) ed.state='unlocked';
      if (ed.from===node.id) {
        var tgt=nm[ed.to], reqs=PREREQS[ed.to]||[];
        var ok=reqs.every(function(r){ return nm[r]&&nm[r].state==='unlocked'; });
        if (tgt&&tgt.state==='locked'&&ok) tgt.state='available';
        if (tgt&&tgt.state!=='locked') ed.state='available';
      }
    });
  });
  addLog('✓ 解鎖「'+node.label+'」（-'+cost+' 點）');
  updateUI(t);
  ach.check(buildCtx(node.id));
  updateAchUI();
}

function makeTreeOptions() {
  return {
    title:'IELTS 能力科技樹',
    subtitle:'TT-IELTS  CYCLE-1  VOCAB·READ·GRAMMAR·THINK',
    footer:'RM ★  IELTS-0301  TL DB-E',
    nodeSize:60, nodeGap:46, padding:40,
    dotCount:3, dotRadius:3.5, lineWidth:1.5,
    themeName: currentTheme,
    scale: parseFloat(document.getElementById('scale-slider').value)||1,
    typography: buildTypography(parseFloat(document.getElementById('font-slider').value)||1),
    nodes: NODES.map(function(n){return Object.assign({},n);}),
    edges: EDGES.map(function(e){return Object.assign({},e);}),
    onNodeClick: handleClick,
  };
}

function buildTypography(fs) {
  // fs is a font-only scale multiplier, applied on top of default rem sizes
  function r(base){ return (base*fs).toFixed(3)+'rem'; }
  return {
    nodeLabel:    r(0.74), nodeBadge:    r(0.62),
    tooltipTitle: r(0.92), tooltipDesc:  r(0.80), tooltipMeta: r(0.70),
    headerTitle:  r(0.94), headerSub:    r(0.72), footer:      r(0.64),
  };
}

function initTree() {
  tree = new TechTree('#ielts-tree', makeTreeOptions());
  updateUI(tree);
  ach.check(buildCtx(null));
  updateAchUI();
}

function addPoints(n) {
  sp += n;
  ['hdr-sp','sb-sp'].forEach(function(id){ document.getElementById(id).textContent=sp; });
  addLog('＋'+n+' 學習點（現有 '+sp+'）','warn');
}

function doReset() {
  sp=8; sessionUnlockedCount=0;
  document.getElementById('ielts-tree').innerHTML='';
  document.getElementById('ring-fg').setAttribute('stroke','var(--attention)');
  initTree();
  addLog('↺ 科技樹已重置','info');
}

/* ── Theme buttons ─────────────────────────────────── */
document.getElementById('theme-btns').addEventListener('click', function(e) {
  var btn = e.target.closest('.theme-btn');
  if (!btn) return;
  var name = btn.getAttribute('data-theme');
  currentTheme = name;
  document.querySelectorAll('.theme-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  // Apply to both components
  tree.setTheme(name);
  ach.setTheme(name);
  addLog('主題切換：'+name, 'info');
});

/* ── Scale slider ──────────────────────────────────── */
document.getElementById('scale-slider').addEventListener('input', function() {
  var v = parseFloat(this.value);
  document.getElementById('scale-val').textContent = v.toFixed(2)+'×';
  tree.setScale(v);
});

/* ── Font slider ───────────────────────────────────── */
document.getElementById('font-slider').addEventListener('input', function() {
  fontScale = parseFloat(this.value);
  document.getElementById('font-val').textContent = fontScale.toFixed(2)+'×';
  // Update entire page UI via CSS variable (sidebar, topbar, etc.)
  document.documentElement.style.setProperty('--ui-scale', fontScale);
  // Update TechTree + AchievementSystem components
  tree.setTypography(buildTypography(fontScale));
  ach.setTypography({
    panelTitle:   (0.86*fontScale).toFixed(3)+'rem',
    panelItem:    (0.80*fontScale).toFixed(3)+'rem',
    panelDesc:    (0.70*fontScale).toFixed(3)+'rem',
    panelMeta:    (0.63*fontScale).toFixed(3)+'rem',
    toastTitle:   (0.86*fontScale).toFixed(3)+'rem',
    toastDesc:    (0.70*fontScale).toFixed(3)+'rem',
    toastEyebrow: (0.62*fontScale).toFixed(3)+'rem',
    progressLabel:(0.66*fontScale).toFixed(3)+'rem',
  });
});

initTree();
</script>
